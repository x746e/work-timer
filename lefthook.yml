pre-commit:
  parallel: true
  commands:
    check_updates:
      run: uv lock -U --dry-run
    pylint:
      run: uv run pylint src -v
      skip: false
      glob: "*"
    pytest:
      run: '(unset $(git rev-parse --local-env-vars); uv run pytest -x -n 8 --durations 3)'
    ruff:
      run: uv run ruff check
    pyright:
      run: uv run pyright
